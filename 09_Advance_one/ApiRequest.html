<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Api</title>
</head>
<body>
    


    <script>
        const url='https://api.github.com/users/manan-me'
        const xhr=new XMLHttpRequest()
        xhr.open('GET',url)
        xhr.onreadystatechange=function(){
            console.log(xhr.readyState);

            if(xhr.readyState=== 4){

                // const data=this.responseText  // not objectbut return a string
                // console.log(typeof data);  //string not object
                
                const data=JSON.parse(this.responseText)  // solution 
                console.log(typeof data);  // object
                console.log(data.followers);
                
            }

        }

    
        
        xhr.send()
    </script>
</body>
</html>
