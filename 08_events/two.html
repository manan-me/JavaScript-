<html lang="en">

<body>
    <h1>A sync Projects</h1>
    <button id="stop">Stop</button>

<script>

// setTimeout(()=>{

                                 // also can be using reference

let func=()=>{
    console.log('Manan');
                                 
}

// setTimeout(func,2000)

// interval method do this continously known as interval


// setInterval(func,2000)

let changeText=()=>{
    document.querySelector('h1').innerHTML='Asyn projects by Manan'
}
 let timeout=setTimeout(changeText,2000)

document.getElementById('stop').addEventListener('click',()=>{
    clearTimeout(timeout)
    console.log('Changing text timeout is stoped');
    
})



</script>
